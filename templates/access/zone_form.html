{% extends "base.html" %}
{% block title %}Zone{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6">
  <h1 class="text-xl font-bold mb-4">{% if object %}Edit{% else %}New{% endif %} zone</h1>
  <form method="post" class="space-y-3">{% csrf_token %}{{ form.as_p }}
    <button class="bg-slate-900 text-white px-4 py-2 rounded-lg font-semibold">Save</button>
  </form>
</div>
{% endblock %}
