{% extends "base.html" %}
{% block title %}Register walk-in{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-6">
  <h1 class="text-xl font-bold mb-1">Register a walk-in visitor</h1>
  <p class="text-sm text-slate-500 mb-4">Blacklist check, approval, pass and check-in happen in one step.</p>
  <form method="post" class="space-y-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="bg-amber-500 text-white px-4 py-2 rounded-lg font-semibold">Register & check in</button>
  </form>
</div>
{% endblock %}
