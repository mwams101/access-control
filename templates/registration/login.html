{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-xl shadow p-6 mt-10">
  <h1 class="text-xl font-bold mb-4">Sign in</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-slate-900 text-white rounded-lg py-2 font-semibold">Login</button>
  </form>
  <p class="text-sm mt-4 text-slate-500">
    Visiting? <a href="{% url 'accounts:signup' %}" class="text-sky-700 underline">Create a visitor account</a>
  </p>
</div>
{% endblock %}
